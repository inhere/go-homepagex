# 另一个页面配置示例
title: "Another Page"
subtitle: "Secondary dashboard"

theme: "forest-canopy"
style: "list"  # 使用列表样式
columns: "1"

services:
  - name: "Bookmarks"
    icon: "fas fa-bookmark"
    items:
      - name: "GitHub"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/github.png"
        subtitle: "Code hosting"
        url: "https://github.com"
        target: "_blank"
      
      - name: "Stack Overflow"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/stack-overflow.png"
        subtitle: "Q&A for developers"
        url: "https://stackoverflow.com"
        target: "_blank"
      
      - name: "Reddit"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/reddit.png"
        subtitle: "Community discussions"
        url: "https://reddit.com"
        target: "_blank"

  - name: "Tools"
    icon: "fas fa-tools"
    items:
      - name: "Vercel"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/vercel.png"
        subtitle: "Deployment platform"
        url: "https://vercel.com"
        target: "_blank"
      
      - name: "Figma"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/figma.png"
        subtitle: "Design tool"
        url: "https://figma.com"
        target: "_blank"
