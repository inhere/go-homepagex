# 工具页面配置
title: "Internal Tools"
subtitle: "Internal tools and utilities"

theme: "default"
color: "purple"
style: "cards"
columns: "4"

services:
  - name: "Development Tools"
    icon: "fas fa-code"
    items:
      - name: "VS Code"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/vscode.png"
        subtitle: "Code editor"
        tags: ["editor"]
        url: "https://code.visualstudio.com"
        target: "_blank"

      - name: "GitHub"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/github.png"
        subtitle: "Code hosting"
        tags: ["git"]
        url: "https://github.com"
        target: "_blank"

      - name: "GitLab"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/gitlab.png"
        subtitle: "DevOps platform"
        tags: ["git"]
        url: "https://gitlab.com"
        target: "_blank"

      - name: "Docker Hub"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/docker.png"
        subtitle: "Container registry"
        tags: ["container"]
        url: "https://hub.docker.com"
        target: "_blank"

  - name: "Cloud Services"
    icon: "fas fa-cloud"
    items:
      - name: "AWS"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/aws.png"
        subtitle: "Amazon Web Services"
        tags: ["cloud"]
        url: "https://aws.amazon.com"
        target: "_blank"

      - name: "Google Cloud"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/gcp.png"
        subtitle: "GCP"
        tags: ["cloud"]
        url: "https://cloud.google.com"
        target: "_blank"

      - name: "Azure"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/azure.png"
        subtitle: "Microsoft Azure"
        tags: ["cloud"]
        url: "https://azure.microsoft.com"
        target: "_blank"

      - name: "Vercel"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/vercel.png"
        subtitle: "Deployment platform"
        tags: ["deploy"]
        url: "https://vercel.com"
        target: "_blank"

  - name: "Monitoring"
    icon: "fas fa-chart-line"
    items:
      - name: "Grafana"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/grafana.png"
        subtitle: "Metrics dashboard"
        tags: ["monitor"]
        url: "https://grafana.com"
        target: "_blank"

      - name: "Prometheus"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/prometheus.png"
        subtitle: "Monitoring"
        tags: ["monitor"]
        url: "https://prometheus.io"
        target: "_blank"

      - name: "Uptime Kuma"
        logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/uptime-kuma.png"
        subtitle: "Uptime monitor"
        tags: ["monitor"]
        url: "https://uptime.kuma.pet"
        target: "_blank"
