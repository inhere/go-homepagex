<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e4e4e4;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .loading, .error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
            font-size: 1.2rem;
        }

        .loading i, .error i {
            font-size: 3rem;
        }

        .error {
            color: #e74c3c;
        }

        /* Header */
        .header {
            margin-bottom: 30px;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 12px;
        }

        .logo-placeholder {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            font-size: 2rem;
            color: white;
        }

        .title-section {
            flex: 1;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin: 8px 0 0 0;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .style-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #e4e4e4;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .style-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Services Container */
        .services-container {
            display: grid;
            grid-template-columns: repeat(var(--columns, 3), 1fr);
            gap: 24px;
        }

        .app.list .services-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Service Group */
        .service-group {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .service-group:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .app.list .service-group {
            padding: 16px;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app.list .group-header {
            margin-bottom: 12px;
            padding-bottom: 8px;
        }

        .group-header i {
            font-size: 1.5rem;
            color: #667eea;
            width: 32px;
            text-align: center;
        }

        .app.list .group-header i {
            font-size: 1.2rem;
        }

        .group-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
            margin: 0;
        }

        .app.list .group-header h2 {
            font-size: 1.1rem;
        }

        .items-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .app.list .items-container {
            gap: 8px;
        }

        /* Service Item - Card Style */
        .service-item {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .service-item.card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .service-item.card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateX(4px);
        }

        /* Service Item - List Style */
        .service-item.list {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .service-item.list:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .item-logo {
            flex-shrink: 0;
        }

        .item-logo img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 8px;
        }

        .service-item.list .item-logo img {
            width: 36px;
            height: 36px;
        }

        .logo-fallback {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            color: white;
            font-size: 1.2rem;
        }

        .service-item.list .logo-fallback {
            width: 36px;
            height: 36px;
            font-size: 1rem;
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .item-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            margin: 0;
        }

        .service-item.list .item-content h3 {
            font-size: 1rem;
        }

        .item-subtitle {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin: 4px 0 0 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .service-item.list .item-subtitle {
            font-size: 0.8rem;
            margin-top: 2px;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(102, 126, 234, 0.3);
            color: #a5b4fc;
            font-size: 0.7rem;
            font-weight: 500;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .service-item.list .tag {
            margin-left: auto;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .services-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }

            .title {
                font-size: 1.8rem;
            }

            .logo, .logo-placeholder {
                width: 48px;
                height: 48px;
            }

            .services-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
</body>
</html>
